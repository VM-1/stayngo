name: Work item
description: StayNGo ticket
title: "[feature|chore|bug|refactor|adr|spike|internal] <imperative summary>"
labels: ["triage"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options: ["0", "1", "2", "3", "4", "5", "6"]
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: ["S (<2h)", "M (2-4h)", "L (4-8h)"]
    validations:
      required: true
  - type: dropdown
    id: executor
    attributes:
      label: Executor
      options: ["by-claude", "by-hand"]
    validations:
      required: true
  - type: textarea
    id: internal_value
    attributes:
      label: Value — what this gives us (required for [internal] tickets)
      description: "Architecture/infra ([internal]) tickets must state the benefit and the need that triggered it — not just the action. E.g. '/me latency → add Redis caching'; 'JIT profile goes stale → add profile-sync webhook'. Leave blank for pure feature tickets."
  - type: textarea
    id: context
    attributes:
      label: Context
      description: "1-3 sentences, in business terms. Why this ticket exists; what user flow/problem it serves. WHAT + WHY only — no code or implementation detail (the implementer owns the how)."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: "Business-observable outcomes as checklist bullets — no code/implementation detail. For tickets that introduce a new concept, include a bullet like: 'docs/db-notes/NNN-<topic>.md written in own words (~300 words)'."
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: learning_objective
    attributes:
      label: Learning objective
      description: "If this ticket exercises or teaches a new concept (pattern, technique, DB feature, framework capability), state it in one sentence. Leave blank for pure plumbing tickets."
      placeholder: "e.g., Postgres `daterange` + GiST exclusion constraint for no-double-booking."
  - type: textarea
    id: references
    attributes:
      label: Learning references
      description: "Per Principle 11. Canonical sources only (title + author + URL). Don't fabricate URLs."
      placeholder: |
        - Postgres docs §8.17 "Range Types" — postgresql.org/docs/current/rangetypes.html
        - Use The Index, Luke — use-the-index-luke.com (search 'exclusion constraint')
  - type: textarea
    id: invariants
    attributes:
      label: Invariants to respect
      description: "Domain rules this ticket must not violate. Reference StayNGo.md §5.3."
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: "Explicit non-goals. Prevents scope creep."
    validations:
      required: true
